<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>OHIF Generic Viewport Migration — Master Plan</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      background: #0b0f17;
      color: #e6edf3;
      -webkit-text-size-adjust: 100%;
    }
    .wrap { max-width: 820px; margin: 0 auto; padding: 16px 18px 96px; }
    .bar {
      position: sticky; top: 0; z-index: 10;
      background: #0b0f17ee; backdrop-filter: blur(8px);
      border-bottom: 1px solid #20283a;
      padding: 10px 18px; display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: #9aa7bd;
    }
    .bar b { color: #e6edf3; }
    .bar button {
      margin-left: auto; background: #1f6feb; color: #fff; border: 0;
      padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
    }
    h1, h2, h3, h4 { line-height: 1.25; margin: 1.4em 0 0.5em; }
    h1 { font-size: 1.6rem; border-bottom: 2px solid #20283a; padding-bottom: .3em; }
    h2 { font-size: 1.3rem; border-bottom: 1px solid #20283a; padding-bottom: .25em; margin-top: 1.8em; }
    h3 { font-size: 1.1rem; color: #cdd7e6; }
    a { color: #58a6ff; }
    code { background: #161b22; padding: 2px 5px; border-radius: 5px; font-size: 0.88em; }
    pre { background: #161b22; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 0.82rem; }
    pre code { background: none; padding: 0; }
    table { border-collapse: collapse; width: 100%; display: block; overflow-x: auto; font-size: 0.9rem; }
    th, td { border: 1px solid #2a3346; padding: 7px 10px; text-align: left; }
    th { background: #161b22; }
    blockquote { border-left: 3px solid #2a3346; margin: 1em 0; padding: 2px 14px; color: #9aa7bd; }
    hr { border: 0; border-top: 1px solid #20283a; margin: 2em 0; }
    /* status tag highlighting */
    strong:has(+ *), strong { font-weight: 700; }
    .err { color: #ff7b72; padding: 20px; }
    /* make [DONE]/[PARTIAL]/[TODO] tags pop */
    .tag-done { color:#3fb950; } .tag-partial { color:#d29922; } .tag-todo { color:#8b949e; }
  </style>
</head>
<body>
  <div class="bar">
    <b>Migration Master Plan</b><span id="ts"></span>
    <button onclick="location.reload()">Refresh</button>
  </div>
  <div class="wrap"><div id="content">Loading…</div></div>
  <script>
    const FILE = 'GENERIC_VIEWPORT_MIGRATION_PLAN.md';
    fetch(FILE + '?t=' + Date.now())
      .then(r => { if (!r.ok) throw new Error(r.status + ' ' + r.statusText); return r.text(); })
      .then(md => {
        let html = marked.parse(md);
        // colorize status tags
        html = html
          .replace(/\[DONE\]/g, '<span class="tag-done">[DONE]</span>')
          .replace(/\[PARTIAL\]/g, '<span class="tag-partial">[PARTIAL]</span>')
          .replace(/\[TODO\]/g, '<span class="tag-todo">[TODO]</span>');
        document.getElementById('content').innerHTML = html;
        document.getElementById('ts').textContent = ' · loaded ' + new Date().toLocaleTimeString();
      })
      .catch(e => {
        document.getElementById('content').innerHTML =
          '<div class="err">Could not load ' + FILE + ': ' + e.message + '</div>';
      });
  </script>
</body>
</html>
