# Netlify Config
#
# TOML Reference:
# https://www.netlify.com/docs/netlify-toml-reference/
#
# We use Netlify for deploy previews and for publishing docs (gh-pages branch).
# https://viewer.ohif.org is created using a different process that is
# managed by CircleCI and deployed to our Google Hosting
#

[build]
  base = ""
  # One-time cache bust for stale Babel hoisting (plugin@7.28.6 + helper@7.27.1).
  # Remove this rm/reinstall prefix after the first green deploy preview.
  build = "rm -rf \"$(git rev-parse --show-toplevel)/node_modules\" \"${NETLIFY_CACHE_DIR}/node_modules\" 2>/dev/null || true && yarn install --pure-lockfile && yarn run build:viewer:ci"
  publish = "dist"


# NODE_VERSION in root `.nvmrc` takes priority
# YARN_FLAGS: https://www.netlify.com/docs/build-gotchas/#yarn
[build.environment]
  # If 'production', `yarn install` does not install devDependencies
  NODE_ENV = "development"
  NODE_VERSION = "20.19.0"
  YARN_VERSION = "1.22.5"
  RUBY_VERSION = "2.6.2"
  YARN_FLAGS = "--no-ignore-optional --pure-lockfile"
  NETLIFY_USE_YARN = "true"

[[headers]]
  # Define which paths this specific [[headers]] block will cover.
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

    # Multi-key header rules are expressed with multi-line strings.
    cache-control = '''
    max-age=0,
    no-cache,
    no-store,
    must-revalidate'''
