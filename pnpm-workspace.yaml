packages:
  - platform/*
  - extensions/*
  - modes/*
shamefullyHoist: true
allowBuilds:
  '@scarf/scarf': true
  '@swc/core': true
  core-js: true
  core-js-pure: true
  cypress: true
  protobufjs: true
  sharp: true
overrides:
  commander: 8.3.0
  cross-env: 7.0.3
  cross-spawn: 7.0.6
  dcmjs: 0.49.4
  path-to-regexp: 0.1.12
  nth-check: 2.1.1
  trim-newlines: 5.0.0
  glob-parent: 6.0.2
  trim: 1.0.1
  package-json: 8.1.1
  rollup: 2.79.2
  body-parser: 1.20.3
  axios: 1.13.5
  core-js: 3.45.1
  '@babel/runtime-corejs2': 7.26.10
  tapable: 2.2.2
  '@cornerstonejs/codec-openjpeg': 1.3.0
  node-forge: 1.3.2
  qs: 6.14.1
  lodash: 4.17.23
  lodash-es: 4.17.23
  diff: 5.2.2
  webpack: 5.105.0
  tar: 7.5.9
  sharp: 0.34.5
  # Force a single modern tslib for the whole workspace. Without this, rxjs@6
  # pulls in tslib@1, which gets hoisted to root node_modules and shadows the
  # tslib@2 that modern packages (e.g. react-remove-scroll) need for
  # __spreadArray.
  tslib: ^2.8.1
