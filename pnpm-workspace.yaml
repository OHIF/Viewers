packages:
  - platform/*
  - extensions/*
  - modes/*

# Mirror the cornerstone3D pnpm setup (libs/@cornerstonejs) which is known-good.
nodeLinker: hoisted
strictPeerDependencies: false
linkWorkspacePackages: true
preferWorkspacePackages: true
minimumReleaseAge: 2880
frozenLockfile: true

allowBuilds:
  '@scarf/scarf': true
  '@swc/core': true
  core-js: true
  core-js-pure: true
  cypress: true
  protobufjs: true
  sharp: true
overrides:
  # Synced from origin/master's package.json `resolutions` block during the
  # merge. Keep this list aligned with master so security/version pins from
  # upstream PRs land here too.
  commander: 8.3.0
  cross-env: 7.0.3
  cross-spawn: 7.0.6
  dcmjs: 0.49.4
  path-to-regexp: 0.1.13
  nth-check: 2.1.1
  trim-newlines: 5.0.0
  glob-parent: 6.0.2
  trim: 1.0.1
  package-json: 8.1.1
  rollup: 2.80.0
  body-parser: 1.20.3
  axios: 1.17.0
  core-js: 3.45.1
  '@babel/runtime-corejs2': 7.26.10
  tapable: 2.2.2
  '@cornerstonejs/codec-openjpeg': 1.3.0
  node-forge: 1.4.0
  qs: 6.14.1
  lodash: 4.18.1
  lodash-es: 4.18.1
  diff: 5.2.2
  webpack: 5.105.0
  tar: 7.5.11
  serialize-javascript: 7.0.4
  svgo: 3.3.3
  flatted: 3.4.2
  handlebars: 4.7.9
  protobufjs: 7.5.7
  tmp: 0.2.6
  '@babel/plugin-transform-modules-systemjs': 7.29.4
  # pnpm-branch-only overrides (kept across merges from master).
  sharp: 0.34.5
  # Force a single modern tslib for the whole workspace. Without this, rxjs@6
  # pulls in tslib@1, which gets hoisted to root node_modules and shadows the
  # tslib@2 that modern packages (e.g. react-remove-scroll) need for
  # __spreadArray.
  tslib: ^2.8.1
