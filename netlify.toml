# Netlify Config
#
# TOML Reference:
# https://www.netlify.com/docs/netlify-toml-reference/
#
# We use Netlify for deploy previews and for publishing docs (gh-pages branch).
# https://viewer.ohif.org is created using a different process that is
# managed by CircleCI and deployed to our Google Hosting

[build]
  base = ""
  # Build OHIF against the CS3D ref in .cs3d-ref (a branch is cloned, built with
  # build:esm, and symlinked into node_modules; a version is pinned + reinstalled).
  # No-op when .cs3d-ref is absent, so production/master builds are unaffected.
  # Runs after Netlify's own `pnpm install`, so the link lands on real node_modules.
  command = "bash .scripts/ci/setup-cs3d.sh && pnpm run build:ci"
  publish = "platform/app/dist"

[build.environment]
  # If 'production', `pnpm install` does not install devDependencies
  NODE_ENV = "development"
  NODE_VERSION = "24.15.0"

[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

    cache-control = '''
    max-age=0,
    no-cache,
    no-store,
    must-revalidate'''
