# Netlify Config
#
# TOML Reference:
# https://www.netlify.com/docs/netlify-toml-reference/
#
# We use Netlify for deploy previews and for publishing docs (gh-pages branch).
# https://viewer.ohif.org is created using a different process that is
# managed by CircleCI and deployed to our Google Hosting

[build]
  base = ""
  command = "pnpm run build:ci"
  publish = "platform/app/dist"

[build.environment]
  # If 'production', `pnpm install` does not install devDependencies
  NODE_ENV = "development"
  NODE_VERSION = "24.15.0"

[[headers]]
  for = "/*"

  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

    # Report-only baseline CSP: observational only, enforces nothing.
    # Violations against the demo PACS origin (connect-src) are expected on
    # previews; the header exists to catch NEW script-src/worker-src
    # regressions before they hit CSP-enabled Docker deployments.
    # 'unsafe-inline' in script-src is an interim allowance for the two
    # inline scripts in index.html (window.PUBLIC_URL and
    # browserImportFunction); a hash-based replacement is the planned
    # fast-follow.
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'"

    cache-control = '''
    max-age=0,
    no-cache,
    no-store,
    must-revalidate'''
