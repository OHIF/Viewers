# JWT auth is active. To temporarily re-enable HTTP Basic Auth (htpasswd fallback):
# 1. Set HTPASSWD_FALLBACK=true in your .env
# 2. Switch to docker/nginx.htpasswd.conf by mounting it instead of this file
# Remove this fallback in Sprint 2 once INT-04 is verified in production.

worker_processes 2;
error_log /var/logs/nginx/mydomain.error.log;
pid /var/run/nginx.pid;
include /usr/share/nginx/modules/*.conf;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include '/etc/nginx/mime.types';
  default_type application/octet-stream;

  keepalive_timeout 65;
  keepalive_requests 100000;
  tcp_nopush on;
  tcp_nodelay on;

  server {
    listen [::]:80 default_server;
    listen 80;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 9;
    etag on;

    # Reverse proxy for Orthanc DICOMWeb APIs — JWT-gated (INT-05).
    # Credential: platform JWT as Authorization Bearer header, or the
    # blackvoxel_jwt cookie set by the viewer's jwtBridge (browser image
    # loads can't carry Authorization headers through cornerstone).
    location /pacs/ {
      auth_request /auth/verify;

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      expires 0;
      add_header Cache-Control private;

      proxy_pass http://orthanc:8042/;
    }

    # Reverse proxy for audit-service management endpoints
    location /audit/ {
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://audit-service:8080/;
    }

    # Do not cache service worker — required for offline-first updates.
    location /sw.js {
      add_header Cache-Control "no-cache";
      proxy_cache_bypass $http_pragma;
      proxy_cache_revalidate on;
      expires off;
      access_log off;
    }

    # Single Page App — shell is public. Browser page navigations carry no
    # Authorization header, so gating the shell here would 401 every visit;
    # auth is enforced client-side (jwtBridge redirects token-less users to
    # the platform login) and server-side on the data routes (/pacs/ above).
    location / {
      root /var/www/html;
      index index.html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Internal auth_request subrequest — not accessible from outside
    location = /auth/verify {
      internal;
      proxy_pass http://audit-service:8080/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header Cookie $http_cookie;
    }
  }
}
