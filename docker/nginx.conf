# JWT auth (INT-05) is the SOLE gate for /pacs/, verified in production.
# The legacy HTTP Basic Auth (htpasswd) fallback was removed per SEC-19
# (docker/nginx.htpasswd.conf deleted; it also set a wildcard CORS header).

worker_processes 2;
error_log /var/logs/nginx/mydomain.error.log;
pid /var/run/nginx.pid;
include /usr/share/nginx/modules/*.conf;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include '/etc/nginx/mime.types';
  default_type application/octet-stream;

  keepalive_timeout 65;
  keepalive_requests 100000;
  tcp_nopush on;
  tcp_nodelay on;

  server {
    listen [::]:80 default_server;
    listen 80;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 9;
    etag on;

    # Reverse proxy for Orthanc DICOMWeb APIs — JWT-gated (INT-05).
    # Credential: platform JWT as Authorization Bearer header, or the
    # blackvoxel_jwt cookie set by the viewer's jwtBridge (browser image
    # loads can't carry Authorization headers through cornerstone).
    location /pacs/ {
      auth_request /auth/verify;

      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      expires 0;
      add_header Cache-Control private;

      proxy_pass http://orthanc:8042/;
    }

    # Reverse proxy for audit-service management endpoints
    location /audit/ {
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://audit-service:8080/;
    }

    # Do not cache service worker — required for offline-first updates.
    location /sw.js {
      add_header Cache-Control "no-cache";
      proxy_cache_bypass $http_pragma;
      proxy_cache_revalidate on;
      expires off;
      access_log off;
    }

    # Single Page App — shell is public. Browser page navigations carry no
    # Authorization header, so gating the shell here would 401 every visit;
    # auth is enforced client-side (jwtBridge redirects token-less users to
    # the platform login) and server-side on the data routes (/pacs/ above).
    location / {
      root /var/www/html;
      index index.html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";

      # Browser hardening for the viewer shell (SEC-16). Clickjacking +
      # MIME-sniffing + referrer + transport are locked down. A full CSP
      # default-src is intentionally omitted here: OHIF/cornerstone rely on
      # WASM, web workers and blob: URLs, so we restrict only frame-ancestors
      # (anti-clickjacking) rather than risk breaking image rendering.
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Content-Security-Policy "frame-ancestors 'none'" always;
      add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
      add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # Internal auth_request subrequest — not accessible from outside
    location = /auth/verify {
      internal;
      proxy_pass http://audit-service:8080/auth/verify;
      proxy_pass_request_body off;
      proxy_set_header Content-Length "";
      proxy_set_header Host $host;
      proxy_set_header Authorization $http_authorization;
      proxy_set_header Cookie $http_cookie;
      # MIMPS-17: audit context forwarded so the service can emit structured logs.
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
