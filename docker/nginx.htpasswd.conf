# HTPASSWD FALLBACK CONFIG
# This file is mounted in place of docker/nginx.conf when HTPASSWD_FALLBACK=true.
# Do NOT use in production — JWT auth (nginx.conf) is the active gate.
# Remove this fallback in Sprint 2 once INT-04 is verified in production.

worker_processes 2;
error_log /var/logs/nginx/mydomain.error.log;
pid /var/run/nginx.pid;
include /usr/share/nginx/modules/*.conf;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include '/etc/nginx/mime.types';
  default_type application/octet-stream;

  keepalive_timeout 65;
  keepalive_requests 100000;
  tcp_nopush on;
  tcp_nodelay on;

  server {
    listen [::]:80 default_server;
    listen 80;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 9;
    etag on;

    # Reverse proxy for Orthanc DICOMWeb APIs
    location /pacs/ {
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      expires 0;
      add_header Cache-Control private;
      add_header 'Access-Control-Allow-Origin' '*' always;

      proxy_pass http://orthanc:8042/;
    }

    # Reverse proxy for audit-service management endpoints
    location /audit/ {
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_pass http://audit-service:8080/;
    }

    # Do not cache service worker — required for offline-first updates.
    location /sw.js {
      add_header Cache-Control "no-cache";
      proxy_cache_bypass $http_pragma;
      proxy_cache_revalidate on;
      expires off;
      access_log off;
    }

    # Single Page App — htpasswd gate (fallback mode)
    location / {
      auth_basic "MIMPS Demo";
      auth_basic_user_file /etc/nginx/.htpasswd;

      root /var/www/html;
      index index.html;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
  }
}
