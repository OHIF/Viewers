# MIMPS-13 — containerized viewer edge config (compose "full" profile).
#
# This is the in-container variant of docker/nginx.conf (the host-nginx prod
# config — do NOT edit that one for container concerns). Differences:
#   - server-block only: dropped into /etc/nginx/conf.d/default.conf under the
#     stock nginx:alpine main config.
#   - upstreams are compose service names: audit-service:8080 and the
#     orthanc-nginx gateway (the host config points at loopback ports).
#   - /pacs/ proxies to the GATEWAY with the prefix PRESERVED
#     (`proxy_pass http://orthanc-nginx:80;` — no trailing path). The gateway
#     strips /pacs/ and injects the Orthanc Basic credentials server-side.
#     The host config instead proxied orthanc directly; in the container the
#     gateway owns credential injection, exactly like the VPS edge.
#   - no Strict-Transport-Security here: this container speaks plain HTTP and
#     HSTS belongs at the TLS-terminating edge in front of it.

server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_comp_level 9;
  etag on;

  # Reverse proxy for Orthanc DICOMweb — JWT-gated (INT-05).
  # Credential: platform JWT as Authorization Bearer header, or the
  # blackvoxel_jwt cookie set by the viewer's jwtBridge (browser image
  # loads can't carry Authorization headers through cornerstone).
  location /pacs/ {
    auth_request /auth/verify;

    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Large STOW-RS uploads (multi-frame DICOM) — parity with the gateway.
    client_max_body_size 512M;

    expires 0;
    add_header Cache-Control private;

    # Preserve /pacs/ — the gateway location is /pacs/ and strips the prefix
    # itself (see docker/orthanc-nginx.conf.template and docker/README.md).
    proxy_pass http://orthanc-nginx:80;
  }

  # Audit-service management endpoints.
  location /audit/ {
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_pass http://audit-service:8080/;
  }

  # Do not cache service worker — required for offline-first updates.
  location = /sw.js {
    add_header Cache-Control "no-cache";
    expires off;
    access_log off;
  }

  # Single Page App — shell is public. Browser page navigations carry no
  # Authorization header, so gating the shell here would 401 every visit;
  # auth is enforced client-side (jwtBridge redirects token-less users to
  # the platform login) and server-side on the data routes (/pacs/ above).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";

    # Browser hardening for the viewer shell (SEC-16). A full CSP default-src
    # is intentionally omitted: OHIF/cornerstone rely on WASM, web workers and
    # blob: URLs, so we restrict only frame-ancestors (anti-clickjacking).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  }

  # Internal auth_request subrequest — not accessible from outside.
  location = /auth/verify {
    internal;
    proxy_pass http://audit-service:8080/auth/verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header Host $host;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
  }
}
