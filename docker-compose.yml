# MIMPS — DICOM backend (MIMPS-05) + full-stack profile (MIMPS-13).
#
# Default service set (what the VPS runbook runs — DO NOT change its behavior):
#   docker compose up -d                  # orthanc + orthanc-nginx only
#   curl -u mimps:$ORTHANC_PASSWORD http://localhost:8042/system
#   curl http://localhost:8899/pacs/dicom-web/studies   # via gateway (CORS + auth injection)
#
# Full stack (local dev / on-prem pilots): adds the containerized viewer and
# the JWT audit-service behind compose profile "full":
#   cp .env.example .env   # set ORTHANC_PASSWORD
#   docker compose --profile full up -d --build
#   open http://localhost:${MIMPS_VIEWER_PORT:-8088}
#
# The profile gating is deliberate: plain `docker compose up -d` never builds
# or starts the new services, so scripts/vps-orthanc-runbook.sh keeps working
# unchanged. On the VPS, viewer (static dist via host nginx) and audit-service
# (systemd mimps-audit.service) run on the HOST — see docker/README.md.

services:
  orthanc:
    image: orthancteam/orthanc:26.6.0
    container_name: mimps-orthanc
    restart: unless-stopped
    ports:
      # REST API / DICOMweb — loopback only; browsers go through orthanc-nginx.
      # Kept exposed locally for the ingest script and admin curl.
      - "127.0.0.1:8042:8042"
      # DICOM protocol (C-STORE etc.) — loopback only for Sprint 1.
      - "127.0.0.1:4242:4242"
    volumes:
      - ./docker/orthanc.json:/etc/orthanc/orthanc.json:ro
      - ./orthanc-storage:/var/lib/orthanc/db
    environment:
      # Secrets come from .env (gitignored). JSON map of user -> password.
      ORTHANC__REGISTERED_USERS: '{"${ORTHANC_USERNAME:-mimps}": "${ORTHANC_PASSWORD:?set ORTHANC_PASSWORD in .env}"}'
      # Data-residency hook (MIMPS-18 groundwork, ANVISA/LGPD): tags where DICOM
      # data is allowed to live. Not yet consumed by services; MIMPS-18 will
      # enforce it. Keep "br-*" values for Brazilian deployments.
      DICOM_STORAGE_REGION: ${DICOM_STORAGE_REGION:-br-local}
      # Disable the image's telemetry/verbose banners for predictable logs.
      VERBOSE_ENABLED: "false"
    healthcheck:
      # The orthancteam/orthanc image ships no curl/wget, but bundles python3
      # (for the Python plugin). Probe /system with Basic auth via urllib.
      test:
        - "CMD"
        - "python3"
        - "-c"
        - |
          import os, base64, urllib.request, sys
          u = os.environ.get("ORTHANC_USERNAME", "mimps")
          p = os.environ["ORTHANC_PASSWORD"]
          req = urllib.request.Request("http://localhost:8042/system")
          req.add_header("Authorization", "Basic " + base64.b64encode(f"{u}:{p}".encode()).decode())
          sys.exit(0 if urllib.request.urlopen(req, timeout=5).status == 200 else 1)
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    # Pass these through so the healthcheck shell can read them.
    env_file:
      - .env

  # PACS gateway: CORS for the viewer origin + server-side Basic auth injection.
  # The OHIF data source points here (http://localhost:8899/pacs/dicom-web in
  # dev, /pacs/dicom-web behind the edge nginx in prod). See the SECURITY NOTE
  # in docker/orthanc-nginx.conf.template before exposing this publicly.
  orthanc-nginx:
    image: nginx:1.27-alpine
    container_name: mimps-orthanc-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8899:80"
    volumes:
      - ./docker/orthanc-nginx.conf.template:/opt/mimps/orthanc-nginx.conf.template:ro
      - ./docker/orthanc-nginx-entrypoint.sh:/docker-entrypoint.d/15-render-pacs-conf.sh:ro
    environment:
      ORTHANC_USERNAME: ${ORTHANC_USERNAME:-mimps}
      ORTHANC_PASSWORD: ${ORTHANC_PASSWORD:?set ORTHANC_PASSWORD in .env}
      MIMPS_VIEWER_ORIGIN: ${MIMPS_VIEWER_ORIGIN:-http://localhost:3000}
    depends_on:
      orthanc:
        condition: service_healthy
    healthcheck:
      # nginx:alpine bundles busybox wget (no curl in the image).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/pacs/system"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Profile "full" (MIMPS-13): complete MIMPS stack for local dev and
  # on-prem/hospital-pilot deployments. Never part of the default `up`.
  # ---------------------------------------------------------------------------

  # JWT verification service for nginx auth_request (INT-05). The viewer
  # container reaches it as http://audit-service:8080; the host bind is
  # loopback-only for direct curl/debugging.
  audit-service:
    profiles: ["full"]
    build:
      context: ./audit-service
    container_name: mimps-audit-service
    restart: unless-stopped
    ports:
      # 8081 on the host (not 8080) so this can never collide with a
      # host-level audit-service (the VPS runs one under systemd on 8080).
      - "127.0.0.1:${AUDIT_SERVICE_PORT:-8081}:8080"
    environment:
      BLACKVOXEL_JWKS_URL: ${BLACKVOXEL_JWKS_URL:-https://blackvoxel.ai/api/auth/.well-known/jwks.json}
    healthcheck:
      # python:slim ships no curl/wget; probe /health with stdlib urllib.
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).status == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s

  # Containerized viewer: nginx serving the built dist behind the JWT gate
  # (docker/nginx.container.conf). /pacs/ -> auth_request audit-service,
  # then proxied to the orthanc-nginx gateway (prefix preserved).
  viewer:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.viewer
      args:
        BLACKVOXEL_API_URL: ${BLACKVOXEL_API_URL:-https://blackvoxel.ai}
        BLACKVOXEL_PLATFORM_URL: ${BLACKVOXEL_PLATFORM_URL:-https://blackvoxel.ai}
    container_name: mimps-viewer
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MIMPS_VIEWER_PORT:-8088}:80"
    depends_on:
      audit-service:
        condition: service_healthy
      orthanc-nginx:
        condition: service_healthy
    healthcheck:
      # nginx:alpine bundles busybox wget (no curl in the image).
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
